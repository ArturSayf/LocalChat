            <ul id="messages"></ul>
        </div>
        <div style="height: 5%; width: 95%;">
            <form action="/send-message" method="post" id="messageForm">
                <input type="text" name="username" id="username" required placeholder="Username" style="width: 75px; border:1px solid #ACD8F0;">
                <textarea name="message" id="messageText" required placeholder="Message" style="width:300px; border:1px solid #ACD8F0;"></textarea>
                <button type="submit" style="width: 50px;">Send</button>
            </form>
        </div>
    </div>

    <script>
        const messagesList = document.getElementById("messages");
        const messageForm = document.getElementById("messageForm");

        // Function to fetch and display messages
        async function fetchMessages() {
            try {
                const res = await fetch('/get-messages'); // Corrected URL
                const data = await res.json();

                // Clear existing messages
                messagesList.innerHTML = '';

                // Display each message
                data.forEach(m => {
                    const element = document.createElement("li");
                    element.textContent = `${m.id}: ${m.name}: ${m.message}`;
                    messagesList.appendChild(element);
                });
            } catch (error) {
                console.error("Error fetching messages:", error);
            }
        }

        // Fetch messages initially and then every second
        fetchMessages();
        setInterval(fetchMessages, 1000);

        // Handle form submission
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent default form submission

            const username = document.getElementById("username").value;
            const messageText = document.getElementById("messageText").value;

            const formData = new FormData(messageForm);

            try {
                const res = await fetch('/send-message', {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`);
                }

                // Clear the message input after successful submission
                document.getElementById("messageText").value = '';

                // Refresh messages after sending
                fetchMessages();

            } catch (error) {
                console.error("Error sending message:", error);
                alert("Failed to send message."); // Basic error handling
            }
        });
    </script>
</body>
</html>
